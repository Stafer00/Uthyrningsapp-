<!DOCTYPE html>
<html lang="sv">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skiduthyrning</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h1>Skiduthyrning</h1>

<div class="form">
  <input id="customer" placeholder="Kundnamn">

  <select id="category">
    <option>Knatte</option>
    <option>Junior</option>
    <option>Vuxen</option>
  </select>

  <select id="length"></select>

  <input type="number" id="days" placeholder="Dagar" min="1">

  <button onclick="rent()">Hyr ut</button>
</div>

<h2>Aktiva uthyrningar</h2>
<div id="rentals"></div>

<script src="app.js"></script>
</body>
</html>
